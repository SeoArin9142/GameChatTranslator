name: Release Build

on:
  push:
    tags:
      - "v.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build, for example v.1.0.8-alpha"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish Windows release
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      SOLUTION_PATH: GameChatTranslator.sln
      PROJECT_PATH: GameChatTranslator/GameChatTranslator.csproj
      PUBLISH_DIR: ${{ github.workspace }}\artifacts\publish
      DIST_DIR: ${{ github.workspace }}\artifacts\dist
      VELOPACK_DIR: ${{ github.workspace }}\artifacts\velopack
      VPK_VERSION: 0.0.1298
      VELOPACK_PACK_ID: GameChatTranslator
      VELOPACK_PACK_TITLE: GameChatTranslator
      VELOPACK_RUNTIME: win10.0.19041-x64

    steps:
      - name: Checkout release source
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve release metadata
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}".Trim()
          } else {
            $tag = "${{ github.ref_name }}".Trim()
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is empty."
          }

          if ($tag -notmatch '^v\.\d+\.\d+\.\d+(-[A-Za-z0-9.-]+)?$') {
            throw "Release tag must look like v.1.0.8 or v.1.0.8-alpha. Actual: $tag"
          }

          [xml]$project = Get-Content $env:PROJECT_PATH
          $version = ($project.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
          $expectedTag = "v.$version"

          if ($tag -ne $expectedTag) {
            throw "Tag and project version do not match. Tag: $tag, expected from .csproj: $expectedTag"
          }

          $assetVersion = $tag -replace '^v\.', 'v'
          $zipName = "GameChatTranslator_$assetVersion.zip"

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TITLE=GameChatTranslator $tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ASSET_VERSION=$assetVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:SOLUTION_PATH

      - name: Build
        shell: pwsh
        run: dotnet build $env:SOLUTION_PATH -c Release -p:EnableWindowsTargeting=true --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test $env:SOLUTION_PATH -c Release -p:EnableWindowsTargeting=true --no-build --no-restore

      - name: Publish win-x64 self-contained package
        shell: pwsh
        run: |
          if (Test-Path $env:PUBLISH_DIR) {
            Remove-Item $env:PUBLISH_DIR -Recurse -Force
          }

          dotnet publish $env:PROJECT_PATH `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:EnableWindowsTargeting=true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o $env:PUBLISH_DIR

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          $toolDir = Join-Path $env:RUNNER_TEMP "vpk"
          if (Test-Path $toolDir) {
            Remove-Item $toolDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $toolDir | Out-Null
          dotnet tool install --tool-path $toolDir vpk --version $env:VPK_VERSION

          $vpkExe = Join-Path $toolDir "vpk.exe"
          if (-not (Test-Path $vpkExe)) {
            throw "vpk.exe was not installed correctly."
          }

          "VPK_EXE=$vpkExe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Write Velopack package notes
        id: velopack_notes
        shell: pwsh
        run: |
          $notesPath = Join-Path $env:RUNNER_TEMP "velopack-release-notes.md"
          $body = @"
          # $env:RELEASE_TITLE

          변경 내역은 README.md의 최신 업데이트 내역을 참고하세요.

          이 패키지는 Velopack 설치형 배포용 메타데이터를 포함합니다.
          - 권장 설치 파일: GameChatTranslator-Setup.exe
          - 수동 실행 대안: $env:ZIP_NAME
          "@

          $body | Set-Content -Path $notesPath -Encoding utf8
          "VELOPACK_NOTES_PATH=$notesPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build Velopack installer assets
        shell: pwsh
        run: |
          if (Test-Path $env:VELOPACK_DIR) {
            Remove-Item $env:VELOPACK_DIR -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $env:VELOPACK_DIR | Out-Null

          try {
            & $env:VPK_EXE download github `
              --outputDir $env:VELOPACK_DIR `
              --repoUrl "https://github.com/${{ github.repository }}" `
              --token "${{ secrets.GITHUB_TOKEN }}"
          } catch {
            Write-Host "No previous Velopack release assets were found. Continuing with full package only."
          }

          & $env:VPK_EXE pack `
            --outputDir $env:VELOPACK_DIR `
            --packId $env:VELOPACK_PACK_ID `
            --packVersion $env:APP_VERSION `
            --packDir $env:PUBLISH_DIR `
            --packAuthors "SeoArin9142" `
            --packTitle $env:VELOPACK_PACK_TITLE `
            --runtime $env:VELOPACK_RUNTIME `
            --mainExe "GameChatTranslator.exe" `
            --releaseNotes $env:VELOPACK_NOTES_PATH `
            --skipVeloAppCheck `
            --noPortable

          Write-Host "Velopack output tree:"
          Get-ChildItem -Path $env:VELOPACK_DIR -Recurse | ForEach-Object {
            Write-Host $_.FullName
          }

      - name: Compress release files and calculate checksums
        id: package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:DIST_DIR | Out-Null

          $zipPath = Join-Path $env:DIST_DIR $env:ZIP_NAME
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $env:PUBLISH_DIR '*') -DestinationPath $zipPath -Force

          $zipHash = (Get-FileHash $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumPath = Join-Path $env:DIST_DIR "sha256.txt"
          $filesToHash = @($zipPath)

          $velopackFiles = Get-ChildItem -Path $env:VELOPACK_DIR -Recurse -File | Where-Object {
            $_.Name -eq "Setup.exe" -or
            $_.Name -like "*-Setup.exe" -or
            $_.Name -like "*-full.nupkg" -or
            $_.Name -like "*-delta.nupkg"
          } | Sort-Object FullName

          foreach ($velopackFile in $velopackFiles) {
            $filesToHash += $velopackFile.FullName
          }

          $checksumLines = foreach ($filePath in $filesToHash) {
            $hash = (Get-FileHash $filePath -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $(Split-Path $filePath -Leaf)"
          }

          $checksumLines | Set-Content -Path $checksumPath -Encoding utf8

          "ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CHECKSUM_PATH=$checksumPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SHA256=$zipHash" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "checksum_path=$checksumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha256=$zipHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Write release notes
        id: notes
        shell: pwsh
        run: |
          $targetCommit = git rev-parse HEAD
          $body = @"
          $env:RELEASE_TITLE 자동 릴리즈 빌드입니다.

          변경 내역은 README.md의 최신 업데이트 내역을 확인해 주세요.

          Build:
          - Runtime: win-x64
          - Publish: self-contained single-file
          - Commit: $targetCommit

          Assets:
          - 권장 설치 파일: Setup.exe 또는 *-Setup.exe (Velopack asset)
          - 수동 실행 ZIP: $env:ZIP_NAME
          - Velopack 릴리즈 인덱스: releases.win.json

          SHA256:
          $(Get-Content $env:CHECKSUM_PATH | Out-String)
          "@

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          $body | Set-Content -Path $notesPath -Encoding utf8
          "RELEASE_NOTES_PATH=$notesPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Velopack assets to GitHub release
        shell: pwsh
        run: |
          & $env:VPK_EXE upload github `
            --outputDir $env:VELOPACK_DIR `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}" `
            --publish `
            --merge `
            --releaseName $env:RELEASE_TITLE `
            --tag $env:RELEASE_TAG `
            --targetCommitish (git rev-parse HEAD)

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}
          fail_on_unmatched_files: false
          overwrite_files: true
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-package
          path: |
            artifacts/dist/*.zip
            artifacts/dist/sha256.txt
            artifacts/velopack/**/*
          if-no-files-found: error
